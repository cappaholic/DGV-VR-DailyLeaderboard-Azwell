name: Snapshot Daily Leaderboard

on:
  workflow_dispatch: # Triggered by cron-job.org via /api/trigger-snapshot or manually
    inputs:
      force:
        description: 'Run even outside the normal 23:30–23:59 UTC snapshot window'
        required: false
        default: false
        type: boolean

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and save leaderboard snapshot
        run: |
          # ── Time-window guard ──────────────────────────────────────
          # The live leaderboard resets at 00:00 UTC. This snapshot is only
          # valid if it runs in the narrow window just before that reset
          # (cron-job.org targets 23:58 UTC). Running outside that window —
          # e.g. an accidental manual trigger mid-day — would capture the
          # WRONG day's data and silently corrupt history.json. Skip unless
          # we're in the window, or the run was explicitly forced.
          FORCE="${{ github.event.inputs.force }}"
          CURRENT_HOUR=$(date -u +%H)
          CURRENT_MIN=$(date -u +%M)
          if [ "$FORCE" != "true" ]; then
            if [ "$CURRENT_HOUR" != "23" ] || [ "$CURRENT_MIN" -lt 30 ]; then
              echo "::warning::Snapshot skipped — current UTC time ($CURRENT_HOUR:$CURRENT_MIN) is outside the expected 23:30-23:59 UTC window. This guard exists to prevent accidentally overwriting today's data with a mid-day snapshot. Re-run manually with the 'force' input checked if this was intentional."
              exit 0
            fi
          fi

          # ── Config ──────────────────────────────────────────────────
          VERCEL_URL="https://dgv-vr-daily-leaderboard-azwell.vercel.app"
          PROJECT_ID="22c95154-2fe0-4923-8792-e2fe16880302"
          LEADERBOARD_ID="daily_challenge"

          # ── Step 1: Get session token from Vercel proxy ──────────────
          echo "Fetching session token..."
          SESSION_RESPONSE=$(curl -s "$VERCEL_URL/api/session")
          SESSION_TOKEN=$(echo "$SESSION_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token'] if d.get('found') and d.get('token') else '')")

          if [ -z "$SESSION_TOKEN" ]; then
            echo "ERROR: Could not retrieve session token"
            exit 1
          fi
          echo "Session token retrieved."

          # ── Step 2: Exchange for access token ────────────────────────
          echo "Exchanging for access token..."
          AUTH_RESPONSE=$(curl -s -X POST "$VERCEL_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"sessionToken\": \"$SESSION_TOKEN\"}")
          ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('accessToken') or d.get('idToken') or '')")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: Could not exchange for access token"
            exit 1
          fi
          echo "Access token retrieved."

          # ── Step 3: Fetch all leaderboard pages ──────────────────────
          echo "Fetching leaderboard..."
          FIRST=$(curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$VERCEL_URL/api/leaderboard/v1/projects/$PROJECT_ID/leaderboards/$LEADERBOARD_ID/scores?limit=100&offset=0")

          TOTAL=$(echo "$FIRST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total', len(d.get('results',[]))))")
          echo "Total scores: $TOTAL"

          # Fetch remaining pages if needed and merge all results
          python3 << EOF
          import json, urllib.request, math, re, time
          from datetime import datetime, timezone

          access_token = "$ACCESS_TOKEN"
          vercel_url   = "$VERCEL_URL"
          project_id   = "$PROJECT_ID"
          lb_id        = "$LEADERBOARD_ID"
          total        = int("$TOTAL")

          first = json.loads('''$FIRST'''.replace("'", "\\'"))
          all_results = first.get("results", [])

          pages = math.ceil(total / 100)
          for page in range(1, pages):
            offset = page * 100
            url = f"{vercel_url}/api/leaderboard/v1/projects/{project_id}/leaderboards/{lb_id}/scores?limit=100&offset={offset}"
            req = urllib.request.Request(url, headers={"Authorization": f"Bearer {access_token}"})
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
              all_results.extend(data.get("results", []))

          # Compute tied ranks
          ranks = []
          for i, entry in enumerate(all_results):
            if i > 0 and entry["score"] == all_results[i-1]["score"]:
              ranks.append(ranks[i-1])
            else:
              ranks.append(i + 1)

          # ── Fetch daily seed from CloudSave, twice, to catch a reset race ──
          def fetch_seed():
            seed_url = f"{vercel_url}/api/cloudsave/v1/data/projects/{project_id}/custom/dailySeed/items"
            req = urllib.request.Request(seed_url, headers={"Authorization": f"Bearer {access_token}"})
            with urllib.request.urlopen(req) as r:
              seed_data = json.loads(r.read())
            seed_entry = next((x for x in seed_data.get("results", []) if x["key"] == "seed"), None)
            return int(seed_entry["value"]) if seed_entry else None

          seed_value    = None
          seed_unstable = False
          try:
            first_seed = fetch_seed()
            time.sleep(5)
            second_seed = fetch_seed()
            if first_seed == second_seed:
              seed_value = first_seed
              print(f"Seed fetched: {seed_value} (stable across two reads 5s apart)")
            else:
              seed_unstable = True
              seed_value = second_seed
              print(f"::warning::Seed changed between reads ({first_seed} -> {second_seed}) — likely caught a reset in progress. Using the second (later) reading: {seed_value}, but flagging this day as seed-unstable.")
          except Exception as e:
            print(f"Seed fetch failed: {e}")

          snapshot = {
            "scores": all_results,
            "ranks":  ranks,
            "total":  total,
            "seed":   seed_value
          }

          # ── Save to public/ so Vercel serves it at /yesterday.json ──
          with open("public/yesterday.json", "w") as f:
            json.dump(snapshot, f)

          print(f"Snapshot saved with {len(all_results)} entries.")

          # ── Append to history.json ───────────────────────────────
          # Strip disc tags (e.g. "PlayerName#1234" -> "PlayerName")
          def strip_disc_tag(name):
            return re.sub(r'#\d{1,6}$', '', name or 'Anonymous').strip()

          today_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          # Build per-player history entries using ranks we already computed
          history_players = []
          for i, entry in enumerate(all_results):
            raw_score = entry.get("score", 0)
            rank      = ranks[i]
            history_players.append({
              "name":   strip_disc_tag(entry.get("playerName", "Anonymous")),
              "rank":   rank,
              "score":  raw_score,
              "vsPar":  None   # filled below if seed/par available
            })

          # ── Compute total par from seed — exact port of index.html's ──
          # ── SystemRandom (C# Knuth subtractive generator) + COURSES ───
          MBIG  = 2147483647
          MSEED = 161803398

          class SystemRandom:
            def __init__(self, seed):
              sa = [0] * 56
              mj = MSEED - abs(seed)
              if mj < 0:
                mj += MBIG
              sa[55] = mj
              mk = 1
              for i in range(1, 55):
                ii = (21 * i) % 55
                sa[ii] = mk
                mk = mj - mk
                if mk < 0:
                  mk += MBIG
                mj = sa[ii]
              for k in range(1, 5):
                for i in range(1, 56):
                  n = i + 30
                  if n >= 55:
                    n -= 55
                  sa[i] -= sa[1 + n]
                  if sa[i] < 0:
                    sa[i] += MBIG
              self.sa = sa
              self.inext  = 0
              self.inextp = 21

            def _internal_sample(self):
              li = self.inext
              lp = self.inextp
              li += 1
              if li >= 56:
                li = 1
              lp += 1
              if lp >= 56:
                lp = 1
              v = self.sa[li] - self.sa[lp]
              if v == MBIG:
                v -= 1
              if v < 0:
                v += MBIG
              self.sa[li] = v
              self.inext  = li
              self.inextp = lp
              return v

            def next(self):
              return self._internal_sample()

            def next_range(self, lo, hi):
              rng = hi - lo
              if rng <= 1:
                return lo
              return lo + int((self._internal_sample() / 2147483647.0) * rng)

          # Exact copy of the COURSES table in index.html — keep these two
          # in sync any time courses/holes change on the front end.
          COURSES = [
            {"name": "Sunshine Glade",    "holes": [3,3,3,3,4]},
            {"name": "Blueberry Thicket", "holes": [3,3,4,3,3,3,3,3,3]},
            {"name": "Oak Hill",          "holes": [4,3,4,4,4,4,4,4,3]},
            {"name": "Lakeside",          "holes": [3,4,3,5,4,3,3,3,5]},
            {"name": "Windswept Fields",  "holes": [3,4,4,3,4,3,3,3,3]},
            {"name": "Harrowing Woods",   "holes": [3,3,3,3,4,4,3,4,5]},
            {"name": "The Crows Nest",    "holes": [3,3,4,4,3,3,4,3,4]},
            {"name": "Grizzly Gulch",     "holes": [3,3,4,3,4,4,3,4,3]},
          ]

          # Mathematically exact bounds given the COURSES data above —
          # any computed par outside this range is provably impossible.
          PAR_MIN, PAR_MAX = 27, 39

          def generate_layout_par(seed):
            rng  = SystemRandom(seed)
            pool = list(range(len(COURSES)))
            selected = []
            for _ in range(3):
              idx = rng.next_range(0, len(pool))
              selected.append(pool.pop(idx))

            total = 0
            for course_idx in selected:
              holes = COURSES[course_idx]["holes"]
              keyed = [(i, par, rng.next()) for i, par in enumerate(holes)]
              keyed.sort(key=lambda x: x[2])
              total += sum(par for (_, par, _) in keyed[:3])
            return total

          total_par   = None
          par_suspect = False
          if seed_value is not None:
            try:
              total_par = generate_layout_par(seed_value)
              print(f"Computed total par from seed: {total_par}")
              if not (PAR_MIN <= total_par <= PAR_MAX):
                par_suspect = True
                print(f"::warning::Computed par ({total_par}) is outside the theoretically possible range ({PAR_MIN}-{PAR_MAX}). Flagging this day as par-suspect.")
              for p in history_players:
                p["vsPar"] = p["score"] - total_par
            except Exception as e:
              print(f"Par computation failed: {e}")

          history_entry = {
            "date":         today_str,
            "seed":         seed_value,
            "par":          total_par,
            "seedUnstable": seed_unstable,
            "parSuspect":   par_suspect,
            "players":      history_players
          }

          # Load existing history, append, save
          history_path = "public/history.json"
          try:
            with open(history_path, "r") as f:
              history = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
            history = []

          # Remove any existing entry for today (in case workflow runs twice)
          history = [d for d in history if d.get("date") != today_str]
          history.append(history_entry)

          with open(history_path, "w") as f:
            json.dump(history, f)

          print(f"History updated: {len(history)} total days recorded.")
          EOF

      - name: Commit snapshot to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/yesterday.json public/history.json
          git diff --staged --quiet || git commit -m "chore: daily leaderboard snapshot [skip ci]"
          git push
