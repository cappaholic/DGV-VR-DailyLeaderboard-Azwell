name: Snapshot Daily Leaderboard

on:
  workflow_dispatch: # Triggered by cron-job.org via /api/trigger-snapshot or manually

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and save leaderboard snapshot
        run: |
          # ── Config ──────────────────────────────────────────────────
          VERCEL_URL="https://dgv-vr-daily-leaderboard-azwell.vercel.app"
          PROJECT_ID="22c95154-2fe0-4923-8792-e2fe16880302"
          LEADERBOARD_ID="daily_challenge"

          # ── Step 1: Get session token from Vercel proxy ──────────────
          echo "Fetching session token..."
          SESSION_RESPONSE=$(curl -s "$VERCEL_URL/api/session")
          SESSION_TOKEN=$(echo "$SESSION_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['token'] if d.get('found') and d.get('token') else '')")

          if [ -z "$SESSION_TOKEN" ]; then
            echo "ERROR: Could not retrieve session token"
            exit 1
          fi
          echo "Session token retrieved."

          # ── Step 2: Exchange for access token ────────────────────────
          echo "Exchanging for access token..."
          AUTH_RESPONSE=$(curl -s -X POST "$VERCEL_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"sessionToken\": \"$SESSION_TOKEN\"}")
          ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('accessToken') or d.get('idToken') or '')")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ERROR: Could not exchange for access token"
            exit 1
          fi
          echo "Access token retrieved."

          # ── Step 3: Fetch all leaderboard pages ──────────────────────
          echo "Fetching leaderboard..."
          FIRST=$(curl -s \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "$VERCEL_URL/api/leaderboard/v1/projects/$PROJECT_ID/leaderboards/$LEADERBOARD_ID/scores?limit=100&offset=0")

          TOTAL=$(echo "$FIRST" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total', len(d.get('results',[]))))")
          echo "Total scores: $TOTAL"

          # Fetch remaining pages if needed and merge all results
          python3 << EOF
          import json, urllib.request, math, re
          from datetime import datetime, timezone

          access_token = "$ACCESS_TOKEN"
          vercel_url   = "$VERCEL_URL"
          project_id   = "$PROJECT_ID"
          lb_id        = "$LEADERBOARD_ID"
          total        = int("$TOTAL")

          first = json.loads('''$FIRST'''.replace("'", "\\'"))
          all_results = first.get("results", [])

          pages = math.ceil(total / 100)
          for page in range(1, pages):
            offset = page * 100
            url = f"{vercel_url}/api/leaderboard/v1/projects/{project_id}/leaderboards/{lb_id}/scores?limit=100&offset={offset}"
            req = urllib.request.Request(url, headers={"Authorization": f"Bearer {access_token}"})
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
              all_results.extend(data.get("results", []))

          # Compute tied ranks
          ranks = []
          for i, entry in enumerate(all_results):
            if i > 0 and entry["score"] == all_results[i-1]["score"]:
              ranks.append(ranks[i-1])
            else:
              ranks.append(i + 1)

          # ── Fetch daily seed from CloudSave ──────────────────────
          seed_value = None
          try:
            seed_url = f"{vercel_url}/api/cloudsave/v1/data/projects/{project_id}/custom/dailySeed/items"
            req = urllib.request.Request(seed_url, headers={"Authorization": f"Bearer {access_token}"})
            with urllib.request.urlopen(req) as r:
              seed_data = json.loads(r.read())
              seed_entry = next((x for x in seed_data.get("results", []) if x["key"] == "seed"), None)
              if seed_entry:
                seed_value = int(seed_entry["value"])
                print(f"Seed fetched: {seed_value}")
          except Exception as e:
            print(f"Seed fetch failed: {e}")

          snapshot = {
            "scores": all_results,
            "ranks":  ranks,
            "total":  total,
            "seed":   seed_value
          }

          # ── Save to public/ so Vercel serves it at /yesterday.json ──
          with open("public/yesterday.json", "w") as f:
            json.dump(snapshot, f)

          print(f"Snapshot saved with {len(all_results)} entries.")

          # ── Append to history.json ───────────────────────────────
          # Strip disc tags (e.g. "PlayerName#1234" -> "PlayerName")
          def strip_disc_tag(name):
            return re.sub(r'#\d{1,6}$', '', name or 'Anonymous').strip()

          today_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          # Compute vs par from seed if available
          def compute_vs_par(score, seed):
            if seed is None:
              return None
            # Minimal LCG matching the JS generateLayout logic
            # We can't replicate the full JS layout here, so store raw score
            # and let the front-end compute vs par from history if needed.
            # For now store the raw score; vsPar will be filled in below.
            return None

          # Build per-player history entries using ranks we already computed
          history_players = []
          for i, entry in enumerate(all_results):
            raw_score = entry.get("score", 0)
            rank      = ranks[i]
            # vs par: if we have seed, we'd need to replicate JS layout math.
            # Store raw score; front-end already knows par from seed in history entry.
            history_players.append({
              "name":   strip_disc_tag(entry.get("playerName", "Anonymous")),
              "rank":   rank,
              "score":  raw_score,
              "vsPar":  None   # filled below if seed available
            })

          # Compute total par from seed using the same LCG as the JS front-end
          total_par = None
          if seed_value is not None:
            try:
              # Replicate JS generateLayout LCG to get total par
              COURSES = [
                {"name":"Sunshine Glade",    "holes":[4,4,4,5,5]},
                {"name":"Blueberry Thicket", "holes":[3,3,4,3,4,3,3,3,3]},
                {"name":"Oak Hill",          "holes":[5,3,5,5,5,4,5,5,4]},
                {"name":"Lakeside",          "holes":[3,4,3,4,5,3,3,3,5]},
                {"name":"Windswept Fields",  "holes":[3,4,4,4,4,3,3,3,3]},
                {"name":"Harrowing Woods",   "holes":[3,3,3,3,3,4,3,4,5]},
                {"name":"Crows Nest",        "holes":[3,3,3,3,5,3,3,3,4]},
                {"name":"Grizzly Gulch",     "holes":[3,3,3,3,4,4,4,4,3]},
              ]
              seed = seed_value
              def lcg_next(s):
                return (s * 1664525 + 1013904223) & 0xFFFFFFFF
              def lcg_range(s, n):
                s = lcg_next(s)
                return s, s % n

              selected = []
              s = seed
              course_indices = list(range(len(COURSES)))
              for _ in range(3):
                s, idx = lcg_range(s, len(course_indices))
                selected.append(course_indices.pop(idx))

              total_par = 0
              for ci, course_idx in enumerate(selected):
                course = COURSES[course_idx]
                hole_indices = list(range(len(course["holes"])))
                for _ in range(3):
                  s, hi = lcg_range(s, len(hole_indices))
                  total_par += course["holes"][hole_indices.pop(hi)]

              print(f"Computed total par from seed: {total_par}")
              for p in history_players:
                p["vsPar"] = p["score"] - total_par
            except Exception as e:
              print(f"Par computation failed: {e}")

          history_entry = {
            "date":    today_str,
            "seed":    seed_value,
            "par":     total_par,
            "players": history_players
          }

          # Load existing history, append, save
          history_path = "public/history.json"
          try:
            with open(history_path, "r") as f:
              history = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
            history = []

          # Remove any existing entry for today (in case workflow runs twice)
          history = [d for d in history if d.get("date") != today_str]
          history.append(history_entry)

          with open(history_path, "w") as f:
            json.dump(history, f)

          print(f"History updated: {len(history)} total days recorded.")
          EOF

      - name: Commit snapshot to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/yesterday.json public/history.json
          git diff --staged --quiet || git commit -m "chore: daily leaderboard snapshot [skip ci]"
          git push
