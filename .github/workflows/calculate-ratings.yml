name: Calculate DGV VR Ratings

on:
  # Runs every Monday at 00:30 UTC (after Sunday's 23:58 snapshot completes)
  schedule:
    - cron: '30 0 * * 1'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force:
        description: 'Force recalculation even if ratings.json is recent'
        required: false
        default: 'false'

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Run rating calculator
        run: python calculate_ratings.py

      - name: Commit ratings.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ratings.json
          if git diff --cached --quiet; then
            echo "No changes to ratings.json — skipping commit."
          else
            git commit -m "chore: update DGV VR ratings [$(date -u '+%Y-%m-%d')]"
            git push
          fi
